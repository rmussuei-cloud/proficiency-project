<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste de Proficiência</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

.container{

max-width:800px;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);

}

h1{

text-align:center;
color:#0b2d5c;

}

input{

width:100%;
padding:12px;
margin-bottom:15px;

}

.question{

margin-top:25px;

}

button{

background:#00a86b;
color:white;
border:none;
padding:15px;
font-size:18px;
cursor:pointer;
border-radius:6px;
width:100%;

}

button:hover{

background:#00895b;

}

#resultado{

margin-top:30px;
font-size:22px;
text-align:center;

}

</style>

</head>

<body>

<div class="container">

<h1>Teste de Proficiência</h1>

<input type="text" placeholder="Nome" id="nome">

<input type="text" placeholder="WhatsApp">

<input type="text" placeholder="Cidade">

<div class="question">

<p><b>1.</b> She ____ to school every day.</p>

<label><input type="radio" name="q1" value="1"> goes</label><br>

<label><input type="radio" name="q1" value="0"> go</label><br>

<label><input type="radio" name="q1" value="0"> going</label>

</div>

<div class="question">

<p><b>2.</b> I ____ a teacher.</p>

<label><input type="radio" name="q2" value="1"> am</label><br>

<label><input type="radio" name="q2" value="0"> is</label><br>

<label><input type="radio" name="q2" value="0"> are</label>

</div>

<div class="question">

<p><b>3.</b> They ____ football yesterday.</p>

<label><input type="radio" name="q3" value="1"> played</label><br>

<label><input type="radio" name="q3" value="0"> play</label><br>

<label><input type="radio" name="q3" value="0"> playing</label>

</div>

<div class="question">

<p><b>4.</b> If I ____ rich, I would travel.</p>

<label><input type="radio" name="q4" value="1"> were</label><br>

<label><input type="radio" name="q4" value="0"> was</label><br>

<label><input type="radio" name="q4" value="0"> am</label>

</div>

<div class="question">

<p><b>5.</b> Choose the correct sentence.</p>

<label><input type="radio" name="q5" value="1"> I have lived here for five years.</label><br>

<label><input type="radio" name="q5" value="0"> I live here since five years.</label>

</div>

<br>

<button onclick="corrigir()">

Ver Resultado

</button>

<div id="resultado"></div>

</div>

<script>

function corrigir(){

let pontos=0;

for(let i=1;i<=5;i++){

let r=document.querySelector("input[name=q"+i+"]:checked");

if(r){

pontos+=Number(r.value);

}

}

let nivel="A1 - Beginner";

if(pontos==2)

nivel="A2 - Elementary";

if(pontos==3)

nivel="B1 - Intermediate";

if(pontos>=4)

nivel="B2 - Upper Intermediate";

document.getElementById("resultado").innerHTML=

"<h2>Seu nível é: "+nivel+"</h2><br><a href='https://wa.me/258871831693?text=Olá.%20Fiz%20o%20teste%20de%20proficiência%20e%20gostaria%20de%20me%20inscrever.' target='_blank'><button>Continuar no WhatsApp</button></a>";

}

</script>

</body>

</html>
